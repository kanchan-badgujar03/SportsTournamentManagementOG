<h2 style="text-align: center; margin-bottom: 20px;">Tournament Schedule</h2>

<table class="schedule-table">
    <thead>
        <tr>
            <th>Team 1</th>
            <th>Team 2</th>
            <th>Date</th>
            <th>Time</th>
            <th>Venue</th>
        </tr>
    </thead>
    <tbody>
        {% for match in schedule %}
        <tr>
            <td>{{ match["Team 1"] }}</td>
            <td>{{ match["Team 2"] }}</td>
            <td>{{ match["Date"] }}</td>
            <td>{{ match["Time"] }}</td>
            <td>{{ match["Venue"] }}</td>
        </tr>
        {% endfor %}
        {% else %}
            <tr>
                <td colspan="5">No matches scheduled.</td>
            </tr>
        {% endif %}
    </tbody>
</table>



<style>
/* Table Styles */
.schedule-table {
    width: 90%;
    margin: 0 auto;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.schedule-table th, .schedule-table td {
    border: 1px solid #ddd;
    padding: 12px 15px;
    text-align: center;
}

.schedule-table th {
    background-color: #74af4c;
    color: white;
    font-size: 16px;
}

.schedule-table tr:nth-child(even) {
    background-color: #f9f9f9;
}

.schedule-table tr:hover {
    background-color: #f1f1f1;
}


</style>
