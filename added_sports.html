<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adding New Games</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2c3e50;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .btn {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
    }
    .btn-add {
      background: #27ae60;
      color: #fff;
      margin-bottom: 15px;
      text-decoration: none;
    }
    .btn-edit {
      background: #2980b9;
      color: #fff;
    }
    .btn-delete {
      background: #c0392b;
      color: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    th {
      background: #34495e;
      color: #fff;
    }
    tr:nth-child(even) {
      background: #f9f9f9;
    }
    tr:hover {
      background: #f1f1f1;
    }
  </style>
</head>
<body>

<header>
  <h1>Sports Tournament Manager</h1>
</header>

<div class="container">
  <h2>New Games</h2>
  <a href="{% url 'admin_dashboard' %}" class="btn btn-add">Go to Dashboard</a>
  
  <!-- Add Team Button -->
  
  <!-- Teams Table -->
  <table>
    <tr>
      <th>Sr.No</th>
      <th>New Game</th>
      <th>Indoor/Outdoor</th>
      
      
    </tr>
    {% for team in t %}
  <tr>
    <td>{{ forloop.counter }}</td>
    
    <td>{{ team.New_Game }}</td>
    <td>{{ team.Indoor_Outdoor }}</td>
    
  </tr>
  {% empty %}
  <tr>
    <td colspan="5">No Games added yet.</td>
  </tr>
  {% endfor %}
    
  </table>
</div>

</body>
</html>
