<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New Team</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("sports-bg.jpg");
      background-size: cover;
      background-position: center;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 15px;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 25px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .button-group {
      display: flex;
      flex-direction: column;  /* stacked (default) */
      justify-content: center;  
      align-items: center; 
              
    }
    .btn {
      display: block;
      width: 50%;
      text-align: center;
      padding: 12px;
      margin-top: 12px;
      background: #27ae60;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
    }
    .btn:hover {
      background: #0ddef9;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sports Tournament Manager</h1>
  </header>

  <div class="container">
    <h2>Add New Team</h2>
    <form action="{% url 'add_team' %}" method="POST">
      {% csrf_token %}
      
      <label for="team-name">Team Name</label>
      <input type="text" id="team_name" name="Team_Name" placeholder="Enter team name" required>

      <label for="sport">Sport</label>
      <select id="sport" name="Sport" required>
        <option value="">--Select Sport--</option>
        <option value="Football">Football</option>
        <option value="Cricket">Cricket</option>
        <option value="Basketball">Basketball</option>
        <option value="Volleyball">Volleyball</option>
      </select>

      <label for="coach">Coach Name</label>
      <input type="text" id="coach" name="Coach_Name" placeholder="Enter coach name" required>

      <label for="players">Number of Players</label>
      <input type="number" id="players" name="Number_of_Players" min="1" max="50" required>

      <div class="button-group">
  <button type="submit" class="btn">Save Team</button>
  <a href="{% url 'manage_teams' %}" class="btn">See all teams</a>
</div>
    </form>
  </div>

</body>
</html>
