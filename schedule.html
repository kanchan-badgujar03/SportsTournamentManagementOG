<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match Schedule</title>

<style>
  #schedule {
  padding: 40px;
  background: #f9f9f9;
  border-radius: 10px;
  margin: 30px auto;
  max-width: 900px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#schedule h2 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 20px;
  color: #2c3e50;
  border-bottom: 3px solid #f39c12;
  display: inline-block;
  padding-bottom: 5px;
}

.schedule-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.schedule-table th,
.schedule-table td {
  padding: 12px 15px;
  text-align: center;
  border: 1px solid #ddd;
}

.schedule-table th {
  background: #2c3e50;
  color: #fff;
  font-size: 16px;
}

.schedule-table tr:nth-child(even) {
  background: #f2f2f2;
}

.schedule-table tr:hover {
  background: #ffeaa7;
  transition: 0.3s;
}


</style>
</head>
<body>

<section id="schedule">
  <h2>📅 Tournament Schedule</h2>
  <table class="schedule-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Match</th>
        <th>Venue</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>5 Sept 2025</td>
        <td>10:00 AM</td>
        <td>Football: Team A vs Team B</td>
        <td>Main Ground</td>
      </tr>
      <tr>
        <td>5 Sept 2025</td>
        <td>2:00 PM</td>
        <td>Basketball: Team C vs Team D</td>
        <td>Indoor Court</td>
      </tr>
      <tr>
        <td>6 Sept 2025</td>
        <td>11:00 AM</td>
        <td>Cricket: Team E vs Team F</td>
        <td>Cricket Stadium</td>
      </tr>
      <tr>
        <td>6 Sept 2025</td>
        <td>4:00 PM</td>
        <td>Volleyball: Team G vs Team H</td>
        <td>Sports Complex</td>
      </tr>
    </tbody>
  </table>
</section>

</body>
</html>
